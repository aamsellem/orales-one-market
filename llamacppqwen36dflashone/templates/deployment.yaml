---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-dflash-env
  namespace: "{{ .Release.Namespace }}"
data:
  TARGET_URL: "https://huggingface.co/unsloth/Qwen3.6-27B-GGUF/resolve/main/Qwen3.6-27B-Q4_K_M.gguf"
  TARGET_FILE: "Qwen3.6-27B-Q4_K_M.gguf"
  DRAFT_URL: "https://huggingface.co/Ardenzard/Qwen3.6-27B-DFlash-GGUF/resolve/main/Qwen3.6-27B-DFlash-Q4_K_M.gguf"
  DRAFT_FILE: "Qwen3.6-27B-DFlash-v2-Q4_K_M.gguf"
  MODEL_ALIAS: "qwen3.6-27b-dflash"
  CTX_SIZE: "196608"
  THREADS: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llamacppqwen36dflashone
  name: llamacppqwen36dflashone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppqwen36dflashone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppqwen36dflashone
    spec:
      containers:
        - name: llamacpp-dflash-server
          image: "docker.io/aamsellem/buun-llama-cpp-dflash:0.2.0"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              MODELS_DIR=${MODELS_DIR:-/models}
              mkdir -p "$MODELS_DIR"
              HF_AUTH=""
              if [ -n "$HF_TOKEN" ]; then HF_AUTH="-H \"Authorization: Bearer $HF_TOKEN\""; fi
              if [ ! -s "$MODELS_DIR/$TARGET_FILE" ]; then
                echo "==> Downloading target $TARGET_FILE (~16 GB)"
                eval curl -fL --retry 10 --retry-delay 10 $HF_AUTH \
                  "$TARGET_URL" -o "$MODELS_DIR/$TARGET_FILE"
              fi
              if [ ! -s "$MODELS_DIR/$DRAFT_FILE" ]; then
                echo "==> Downloading DFlash drafter $DRAFT_FILE (~1 GB)"
                eval curl -fL --retry 10 --retry-delay 10 $HF_AUTH \
                  "$DRAFT_URL" -o "$MODELS_DIR/$DRAFT_FILE"
              fi
              exec /usr/local/bin/llama-server \
                --model "$MODELS_DIR/$TARGET_FILE" \
                --model-draft "$MODELS_DIR/$DRAFT_FILE" \
                --spec-type dflash \
                --alias "$MODEL_ALIAS" \
                --host 0.0.0.0 --port 8000 \
                --n-gpu-layers 99 \
                --n-gpu-layers-draft 99 \
                --ctx-size "${CTX_SIZE:-196608}" \
                --threads "${THREADS:-16}" \
                --cache-type-k turbo3 --cache-type-v turbo3 \
                --batch-size 512 --ubatch-size 512 \
                --parallel 1 \
                --flash-attn on --jinja
          envFrom:
            - configMapRef:
                name: llamacpp-dflash-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: MODELS_DIR
              value: "/models"
            # HAMi-core "0m" parsing bug workaround: Olares default
            # CUDA_DEVICE_MEMORY_LIMIT_0=0m parses as "0 bytes". Override to
            # 24400m (~80 MB margin under hardware 24463 MB).
            - name: CUDA_DEVICE_MEMORY_LIMIT_0
              value: "24400m"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 600
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 4000m
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: llamacppqwen36dflashone
  name: llamacppqwen36dflashone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp-dflash"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: llamacppqwen36dflashone
