spec:
  versionName: '1.0.1'
  upgradeDescription: |
    v1.0.1: swap DFlash drafter from spiritbuun v1 (2026-04-24, dflash-draft-3.6-q4_k_m.gguf) to Ardenzard v2 (2026-04-28, Qwen3.6-27B-DFlash-Q4_K_M.gguf, derived from z-lab v2 update of 2026-04-27). Acceptance rate 24.67% → 29.72% (+20% relative). Throughput 76 → 77.7 t/s steady state (+2.5%, bench validated 2026-05-09). Q8_0 v2 drafter tested (acceptance 31.54%) but rejected — bigger drafter file (1.85 GB vs 1.03 GB) increases draft step time +33% which outweighs acceptance gain → net 73.2 t/s.
    v1.0.0: initial release. Qwen3.6 27B with DFlash speculative decoding + TurboQuant turbo3 KV cache, served via spiritbuun/buun-llama-cpp fork (image aamsellem/buun-llama-cpp-dflash:0.2.0). Target unsloth/Qwen3.6-27B-Q4_K_M.gguf (15.6 GB, standard quant — NOT the MTP variant which buun rejects). Drafter spiritbuun/Qwen3.6-27B-DFlash-GGUF/dflash-draft-3.6-q4_k_m.gguf (986 MB). Validated bench Olares One 2026-05-09: 76 t/s avg @ 96K context per-seq (Space Invaders 2000 tokens × 3 runs). DFlash drafter pos-0 acceptance ~25%, gamma=6 (5 spec tokens per cycle), spec cycle ~71 ms. Effective context limited to 96K because n_seq_max=2 (DFlash dual-buffer) divides ctx-size 196608 / 2 = 98304 per slot. Pushing ctx-size beyond 196608 OOMs at 24 GB VRAM (target 15.6 GB + KV turbo3 ~3 GB @ 128K + drafter 0.99 GB + buffers > limit). For 128K context use llamacppqwen36mtpone (MTP @ 65 t/s). For 88 t/s @ 88K use vllmqwen36turbo27bone.
  fullDescription: |
    Qwen3.6 27B with DFlash speculative decoding + TurboQuant turbo3 KV cache via spiritbuun/buun-llama-cpp fork (forked from TheTom/llama-cpp-turboquant), optimized for Olares One.
    RTX 5090M (24 GB GDDR7, sm_120 Blackwell) + 96 GB DDR5 + Core Ultra 9 275HX.

    Stack:
      - Image: aamsellem/buun-llama-cpp-dflash:0.2.0 (forked from spiritbuun/buun-llama-cpp)
      - Target: unsloth/Qwen3.6-27B-Q4_K_M.gguf (15.6 GB, standard quant)
      - DFlash drafter: Ardenzard/Qwen3.6-27B-DFlash-GGUF/Qwen3.6-27B-DFlash-Q4_K_M.gguf (986 MB, v2 weights from z-lab 2026-04-27 update)
      - Spec method: --spec-type dflash with gamma=6
      - KV cache: turbo3 (3-bit Hadamard rotation, 4.5x compression vs f16)
      - Context: 196608 (96K per-seq with DFlash n_seq_max=2)

    Performance on Olares One (validated 2026-05-09):
      - 76 t/s avg @ 96K context (Space Invaders 2000 tokens × 3 runs, range 70-84 t/s)
      - +17% vs llamacppqwen36mtpone Long Context (65 t/s @ 128K MTP path)
      - Drafter pos-0 acceptance ~25% (DFlash typical 60% — drafter+target alignment limits)
      - Spec cycle: ~71 ms (draft 18 ms + verify 50 ms + accept 4 ms)

    When to use this app:
      - You want Qwen3.6 27B faster than 65 t/s but don't need 128K context
      - 96K context is sufficient for your agentic / RAG / long-doc workflow
      - You prefer llama.cpp stack (vs vLLM Turbo's Genesis 28 patches)

    For 128K context: use llamacppqwen36mtpone (Long Context, 65 t/s).
    For 88 t/s @ 88K: use vllmqwen36turbo27bone (vLLM Turbo).

    First launch downloads ~16 GB target + 1 GB drafter from HuggingFace.
    Exposes an OpenAI-compatible API on port 8000.

