---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-beellama-vision-env
  namespace: "{{ .Release.Namespace }}"
data:
  TARGET_URL: "https://huggingface.co/unsloth/Qwen3.6-27B-GGUF/resolve/main/Qwen3.6-27B-UD-Q3_K_XL.gguf"
  TARGET_FILE: "Qwen3.6-27B-UD-Q3_K_XL.gguf"
  DRAFT_URL: "https://huggingface.co/spiritbuun/Qwen3.6-27B-DFlash-GGUF/resolve/main/dflash-draft-3.6-q8_0.gguf"
  DRAFT_FILE: "dflash-draft-3.6-q8_0.gguf"
  MMPROJ_URL: "https://huggingface.co/unsloth/Qwen3.6-27B-GGUF/resolve/main/mmproj-F16.gguf"
  MMPROJ_FILE: "mmproj-Qwen3.6-27B-F16.gguf"
  MODEL_ALIAS: "qwen3.6-27b-beellama-vision"
  CTX_SIZE: "200000"
  THREADS: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llamacppqwen36beellamavisionone
  name: llamacppqwen36beellamavisionone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppqwen36beellamavisionone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppqwen36beellamavisionone
    spec:
      containers:
        - name: beellama-vision-server
          image: "docker.io/aamsellem/beellama-cpp:0.1.3-rc1"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              MODELS_DIR=${MODELS_DIR:-/models}
              mkdir -p "$MODELS_DIR"
              HF_AUTH=""
              if [ -n "$HF_TOKEN" ]; then HF_AUTH="-H \"Authorization: Bearer $HF_TOKEN\""; fi
              if [ ! -s "$MODELS_DIR/$TARGET_FILE" ]; then
                echo "==> Downloading target $TARGET_FILE (~15 GB)"
                eval curl -fL --retry 10 --retry-delay 10 $HF_AUTH \
                  "$TARGET_URL" -o "$MODELS_DIR/$TARGET_FILE"
              fi
              if [ ! -s "$MODELS_DIR/$DRAFT_FILE" ]; then
                echo "==> Downloading DFlash drafter $DRAFT_FILE (~2 GB)"
                eval curl -fL --retry 10 --retry-delay 10 $HF_AUTH \
                  "$DRAFT_URL" -o "$MODELS_DIR/$DRAFT_FILE"
              fi
              if [ ! -s "$MODELS_DIR/$MMPROJ_FILE" ]; then
                echo "==> Downloading mmproj $MMPROJ_FILE (~1 GB)"
                eval curl -fL --retry 10 --retry-delay 10 $HF_AUTH \
                  "$MMPROJ_URL" -o "$MODELS_DIR/$MMPROJ_FILE"
              fi
              cd /app
              exec ./llama-server \
                --model "$MODELS_DIR/$TARGET_FILE" \
                --spec-draft-model "$MODELS_DIR/$DRAFT_FILE" \
                --mmproj "$MODELS_DIR/$MMPROJ_FILE" \
                --spec-type dflash \
                --spec-dflash-cross-ctx 1024 \
                --alias "$MODEL_ALIAS" \
                --host 0.0.0.0 --port 8000 \
                -ngl 99 --spec-draft-ngl 99 \
                --ctx-size "${CTX_SIZE:-200000}" \
                --threads "${THREADS:-16}" \
                --cache-type-k turbo3 --cache-type-v turbo3 \
                --batch-size 2048 --ubatch-size 2048 \
                --parallel 1 --kv-unified \
                --flash-attn on --jinja --no-mmap --mlock \
                --temp 0.6 --top-k 20 --min-p 0.0
          envFrom:
            - configMapRef:
                name: llamacpp-beellama-vision-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: MODELS_DIR
              value: "/models"
            - name: CUDA_DEVICE_MEMORY_LIMIT_0
              value: "30000m"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 600
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 4000m
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: llamacppqwen36beellamavisionone
  name: llamacppqwen36beellamavisionone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "beellama-vision"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: llamacppqwen36beellamavisionone
