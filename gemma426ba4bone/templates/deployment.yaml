---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-gemma4-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/unsloth/gemma-4-26B-A4B-it-GGUF/resolve/main/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"
  MODEL_FILE: "gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"
  MTP_URL: "https://huggingface.co/AtomicChat/gemma-4-26B-A4B-it-assistant-GGUF/resolve/main/gemma-4-26B-A4B-it-assistant.Q4_K_M.gguf"
  MTP_FILE: "gemma-4-26B-A4B-it-assistant.Q4_K_M.gguf"
  MODEL_ALIAS: "gemma-4-26b-a4b-mtp"
  CONTEXT_SIZE: "131072"
  N_GPU_LAYERS: "99"
  THREADS: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: gemma426ba4bone
  name: gemma426ba4bone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: gemma426ba4bone
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: gemma426ba4bone
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Target already downloaded: $MODEL_PATH"; ls -lh "$MODEL_PATH"
              else
                echo "Downloading target from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL" && mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                ls -lh "$MODEL_PATH"
              fi
              MTP_PATH="/models/${MTP_FILE}"
              if [ -f "$MTP_PATH" ]; then
                echo "MTP drafter already downloaded: $MTP_PATH"; ls -lh "$MTP_PATH"
              else
                echo "Downloading MTP drafter from $MTP_URL ..."
                wget -O "$MTP_PATH.tmp" "$MTP_URL" && mv "$MTP_PATH.tmp" "$MTP_PATH"
                ls -lh "$MTP_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-gemma4-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "docker.io/aamsellem/llamacpp-atomic-mtp:0.1.0"
          command: ["llama-server"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--mtp-head"
            - "/models/$(MTP_FILE)"
            - "--spec-type"
            - "mtp"
            - "--draft-block-size"
            - "3"
            - "--draft-max"
            - "8"
            - "--draft-min"
            - "0"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "-ngl"
            - "$(N_GPU_LAYERS)"
            - "-ngld"
            - "99"
            - "--threads"
            - "$(THREADS)"
            - "-ctk"
            - "turbo3"
            - "-ctv"
            - "turbo3"
            - "-ctkd"
            - "turbo3"
            - "-ctvd"
            - "turbo3"
            - "--batch-size"
            - "2048"
            - "--ubatch-size"
            - "2048"
            - "--parallel"
            - "1"
            - "--mlock"
            - "-fa"
            - "on"
            - "--jinja"
            - "--slot-save-path"
            - "/cache"
            - "--no-context-shift"
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          envFrom:
            - configMapRef:
                name: llamacpp-gemma4-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 4Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
            - mountPath: "/cache"
              name: cache
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
        - name: cache
          emptyDir: {}
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: gemma426ba4bone
  name: gemma426ba4bone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: gemma426ba4bone
status:
  loadBalancer: {}
