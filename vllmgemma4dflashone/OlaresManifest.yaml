spec:
  versionName: '1.0.0'
  upgradeDescription: |
    v1.0.0: initial release. Gemma 4 26B-A4B (compressed-tensors WNA16-Marlin, ~17.5 GB VRAM) target + z-lab DFlash drafter (~0.8 GB) via vLLM tokenspeed-preview-x86_64 image (vLLM 0.20.2rc1.dev67, perf preview, 2026-05-06). Validated bench on Olares One 2026-05-09: **214 t/s steady state** (Space Invaders prompt, 2000 tokens, 3-run avg of runs 2-3, +53% over the llama.cpp + AtomicChat MTP baseline 140 t/s). First public DFlash Gemma 4 result on Blackwell consumer mobile. Drafter pos-0 acceptance ~28% (lower than DFlash typical 60%, target+drafter alignment limited on consumer 24 GB). Forced TRITON_ATTN backend (Gemma 4 head_dim 256/512 heterogeneous) is the main perf cap. Required: max-num-seqs=4 + max-num-batched-tokens=8192 to make num_speculative_tokens=13 schedulable, kv-cache-dtype=fp8, gpu-memory-utilization=0.92, CUDA_DEVICE_MEMORY_LIMIT_0=24400m for HAMi.
  fullDescription: |
    Google Gemma 4 26B-A4B (MoE, 3.8B active, 128 experts) with DFlash speculative decoding via vLLM, optimized for Olares One.
    RTX 5090M Laptop (24 GB, sm_120 Blackwell) + 96 GB DDR5 + Core Ultra 9 275HX.
    Stack:
    - Target: cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit (compressed-tensors WNA16, Marlin kernels, ~17.5 GB on GPU)
    - Drafter: z-lab/gemma-4-26B-A4B-it-DFlash (859 MB safetensors BF16, EAGLE-style — shares target embeds + lm_head)
    - Spec method: DFlash with num_speculative_tokens=13
    - KV cache: FP8 (vLLM native)
    - Image: vllm/vllm-openai:tokenspeed-preview-x86_64-ubuntu2404 (built 2026-05-06)
    Validated bench on Olares One: 214 t/s steady state (Space Invaders, 2000 tokens, 3-run avg). +53% vs llama.cpp + MTP. First public DFlash Gemma 4 result on Blackwell consumer mobile.
    For the MTP variant (140 t/s, llama.cpp + AtomicChat fork) see gemma426ba4bone.
    Apache 2.0 license. OpenAI-compatible API on port 8000.

