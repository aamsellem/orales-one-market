metadata:
  description: "Gemma 4 26B-A4B + DFlash + AWQ via vLLM — Olares One (fastest Gemma 4 path)"
  title: Gemma 4 26B DFlash One
spec:
  fullDescription: |
    Google Gemma 4 26B-A4B with DFlash speculative decoding via vLLM, optimized for Olares One.
    Stack: cyankiwi AWQ-4bit target + z-lab DFlash drafter + num_speculative_tokens=13.
    Validated bench on Olares One: 214 t/s steady state (Space Invaders, 2000 tokens). First public DFlash Gemma 4 result on Blackwell consumer mobile. +53% vs MTP baseline (140 t/s).
    Image: vllm/vllm-openai:tokenspeed-preview-x86_64-ubuntu2404 (perf preview, May 2026).
    OpenAI-compatible API on port 8000. Apache 2.0 license.
