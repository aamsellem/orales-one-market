    Config: full 262K context, q4_0 KV cache, spec-draft-n-max 5.
    Validated 2026-05-09: 77 t/s steady, 75-80% draft acceptance, full 262K native context.
    +18% speed and +105% context vs prior froggeric Q4_K_M-mtp config (65 t/s @ 128K).
    Beats Reddit-reported 80 t/s @ 262K recipe without any custom image — single GGUF swap.
    OpenAI-compatible API on port 8000.
