---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-mtp-env
  namespace: "{{ .Release.Namespace }}"
data:
  TARGET_MODEL: "unsloth/Qwen3.6-27B-GGUF-MTP"
  TARGET_FILE: "Qwen3.6-27B-UD-Q3_K_XL.gguf"
  MODEL_ALIAS: "qwen3.6-27b-mtp"
  CTX_SIZE: "262144"
  THREADS: "16"
  SPEC_DRAFT_N_MAX: "5"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llamacppqwen36mtpone
  name: llamacppqwen36mtpone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppqwen36mtpone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppqwen36mtpone
    spec:
      containers:
        - name: llamacpp-mtp-server
          image: "docker.io/aamsellem/llamacpp-mtp:0.1.0"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              MODELS_DIR=${MODELS_DIR:-/models}
              mkdir -p "$MODELS_DIR"
              if [ ! -f "$MODELS_DIR/$TARGET_FILE" ]; then
                echo "==> Downloading $TARGET_MODEL/$TARGET_FILE"
                HF_AUTH=""
                if [ -n "$HF_TOKEN" ]; then HF_AUTH="-H \"Authorization: Bearer $HF_TOKEN\""; fi
                eval curl -fL --retry 5 --retry-delay 5 $HF_AUTH \
                  "https://huggingface.co/${TARGET_MODEL}/resolve/main/${TARGET_FILE}" \
                  -o "$MODELS_DIR/$TARGET_FILE"
              fi
              exec /usr/local/bin/llama-server \
                --model "$MODELS_DIR/$TARGET_FILE" \
                --alias "$MODEL_ALIAS" \
                --host 0.0.0.0 --port 8000 \
                --n-gpu-layers 99 \
                --ctx-size "${CTX_SIZE:-128000}" \
                --threads "${THREADS:-16}" \
                --cache-type-k q4_0 --cache-type-v q4_0 \
                --batch-size 512 --ubatch-size 512 \
                --parallel 1 \
                --flash-attn on --jinja \
                --spec-type mtp \
                --spec-draft-n-max "${SPEC_DRAFT_N_MAX:-5}" \
                --chat-template-kwargs '{"enable_thinking": false}'
          envFrom:
            - configMapRef:
                name: llamacpp-mtp-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: MODELS_DIR
              value: "/models"
            # HAMi-core "0m" parsing bug workaround (precaution): Olares sets
            # CUDA_DEVICE_MEMORY_LIMIT_0=0m which HAMi parses as "0 bytes". Override
            # to 24300m (~150 MB margin under hardware 24463 MB).
            - name: CUDA_DEVICE_MEMORY_LIMIT_0
              value: "24300m"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 600
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 4000m
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: llamacppqwen36mtpone
  name: llamacppqwen36mtpone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp-mtp"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: llamacppqwen36mtpone
