spec:
  versionName: '1.0.2'
  upgradeDescription: |
    v1.0.2: force re-sync after chart-repo timeout on v1.0.0. No functional change.
  fullDescription: |
    Qwen3.6 35B-A3B Vision (MoE, 3B active) served via llama.cpp — optimized for Olares One.
    Multimodal: accepts images via OpenAI-compatible vision API (image_url format).
    RTX 5090M (24GB) + 96GB DDR5 + Core Ultra 9 275HX.
    Unsloth Dynamic Q4_K_XL quantization (22.4GB) + mmproj F16 (0.9GB).
    Flash attention, CUDA graph optimization, and op-offload enabled.
    llama.cpp b8740 with multimodal projector support + Hadamard rotation KV cache.
    Downloads the GGUF model (~22GB) and mmproj (~0.9GB) on first launch.
    Context 32K (fits model + mmproj + KV q4_0 in 24GB VRAM).
    Exposes an OpenAI-compatible API on port 8080.

