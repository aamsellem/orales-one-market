---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemotron-nvfp4-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_NAME: "nvidia/NVIDIA-Nemotron-Labs-3-Elastic-30B-A3B-NVFP4"
  MODEL_ALIAS: "nemotron-elastic-30b"
  MAX_MODEL_LEN: "4096"
  GPU_MEMORY_UTILIZATION: "0.95"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: nemotronlabselastic30bnvfp4one
  name: nemotronlabselastic30bnvfp4one
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nemotronlabselastic30bnvfp4one
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: nemotronlabselastic30bnvfp4one
    spec:
      containers:
        - name: vllm-server
          image: "vllm/vllm-openai:nightly"
          command:
            - "vllm"
            - "serve"
          args:
            - "$(MODEL_NAME)"
            - "--served-model-name"
            - "$(MODEL_ALIAS)"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "$(MAX_MODEL_LEN)"
            - "--gpu-memory-utilization"
            - "$(GPU_MEMORY_UTILIZATION)"
            - "--max-num-seqs"
            - "1"
            - "--trust-remote-code"
            - "--download-dir"
            - "/models/huggingface"
            - "--dtype"
            - "auto"
            - "--compilation-config"
            - '{"cudagraph_mode": 1, "max_cudagraph_capture_size": 4, "cudagraph_capture_sizes": [1, 2, 4]}'
          envFrom:
            - configMapRef:
                name: nemotron-nvfp4-env
          env:
            - name: HF_HOME
              value: "/models/huggingface"
            - name: HF_ENDPOINT
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_SERVICE }}"
            - name: HF_TOKEN
              value: "{{ .Values.olaresEnv.OLARES_USER_HUGGINGFACE_TOKEN }}"
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            # HAMi memory limit override to give the model + graphs headroom
            - name: CUDA_DEVICE_MEMORY_LIMIT_0
              value: "30000m"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 900
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 180
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 4000m
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: nemotronlabselastic30bnvfp4one
  name: nemotronlabselastic30bnvfp4one
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "vllm"
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: nemotronlabselastic30bnvfp4one
