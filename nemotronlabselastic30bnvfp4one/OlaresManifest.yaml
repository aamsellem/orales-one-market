spec:
  versionName: '1.0.1'
  upgradeDescription: |
    v1.0.1: swap image `vllm/vllm-openai:nightly` (v0.19.2rc1, 2026-05-20 06:22 UTC) → `vllm/vllm-openai:cu129-nightly-x86_64` (v0.21.1rc1.dev169+ga6682d1d2, 2026-05-21 07:38 UTC). New nightly includes PR [#40082](https://github.com/vllm-project/vllm/pull/40082) (meena-at-work, NVIDIA): "Integrate flashinfer b12x MoE and FP4 GEMM kernels for SM120/121". **Bench validated 2026-05-21 on Olares One: 182.14 t/s AVG post-warmup** (9 runs, range 181.85–182.65, σ ≈ 0.3 — even tighter than v1.0.0). **+9.8% vs v1.0.0 (165.91 t/s)** — pure FlashInfer SM120 kernel uplift on NVFP4 MoE. Same model, same compilation-config PIECEWISE graphs, same max_model_len=4096. Confirms the kernel-path matters: PR #40082 specifically targets sm_120/121 (Blackwell consumer) FP4 GEMM, and our hardware is exactly the target.

    Trade-off: v0.21 nightly has stricter KV cache memory accounting than v0.19 — Gemma 4 + Q4 AWQ benched -1.5% on same config because v0.21 forces max_model_len from 128K → 8K to leave KV headroom. But the NVFP4-MoE FlashInfer kernels still net +10% throughput on this Nemotron path. For NVFP4 models specifically, v0.21+ is a strict upgrade. For non-NVFP4 (AWQ/GPTQ/GGUF) keep older image.

    v1.0.0: initial release. NVIDIA Nemotron-Labs Elastic 30B-A3B with native NVFP4 quantization. **First public bench on consumer Blackwell mobile (sm_120 / RTX 5090M): 165.91 t/s AVG** (9 runs post-warmup, range 1.37, σ ≈ 0.5). NEW Olares One champion — **+22% vs Gemma 4 26B-A4B** (135.97 prior champion), +55% vs BeeLlama Qwen3.6 27B + DFlash (107.54), +124% vs llama.cpp Qwen3.6 27B + MTP master (74.28).

    Why it's so fast on Blackwell:
    - Native NVFP4 tensor core path (no dequantize-and-multiply step). vLLM auto-selects `FlashInferCutlassNvFp4LinearKernel` GEMM + `FLASHINFER_CUTLASS` MoE backend.
    - MoE-A3B routing: 128 experts + 1 shared, only ~3B params active per token — comparable active-compute to a dense 3B model.
    - Hybrid Mamba+Attention (`NemotronHForCausalLM`): half the layers are linear-cost state-space, half are quadratic attention.

    The CUDA-graph trick: vLLM's default `FULL_AND_PIECEWISE` graph capture reserves ~4 GB on top of the 18.78 GB model weights, OOM'ing on 24 GB GPUs. This chart ships with `--compilation-config '{"cudagraph_mode": 1, "max_cudagraph_capture_size": 4, "cudagraph_capture_sizes": [1, 2, 4]}'` which switches to PIECEWISE-only with restricted capture sizes. CUDA graph pool drops from ~4 GB to **40 MB**, leaving enough headroom for the model + KV cache.

    Constraints:
    - `max_model_len = 4096` — at 32K context the KV cache wouldn't fit alongside model + graphs. Single-shot Q&A / code completion / agentic calls work fine; long PDFs / multi-turn coding need another app (e.g. `llamacppqwen36beellamaone` at 262K context).
    - `max_num_seqs = 1` — single-stream, no concurrency. Multi-user case wants the Gemma 4 vision app instead.
    - First request after pod boot: ~85s (CUDA graph capture + JIT compile). Subsequent requests hit 165 t/s immediately.
    - NVFP4 quality vs INT4: ModelOpt warns "experimental". Kimi K2.5/K2.6 NVFP4 benches show within-1% MMLU divergence vs INT4 baseline. For this 30B I haven't done quality eval yet — recommended for fast prototyping, not (yet) for hard production tasks.

    Stack:
    - Image: `vllm/vllm-openai:nightly` (vLLM v0.19.2rc1.dev107+g4eafc7292, pinned in chart)
    - Model: `nvidia/NVIDIA-Nemotron-Labs-3-Elastic-30B-A3B-NVFP4` (HF, ~19 GB, NVIDIA Open Model License, public download — no HF token required)
    - First launch downloads ~19 GB of safetensors. OpenAI-compatible chat API on port 8000.

    Reference: [Blog post EN](https://aamsellem.com/blog/en/nemotron-nvfp4-blackwell-mobile-166-tps/) | [FR](https://aamsellem.com/blog/fr/nemotron-nvfp4-blackwell-mobile-166-tps/)
  fullDescription: |
    NVIDIA Nemotron-Labs Elastic 30B-A3B NVFP4 — the fastest local LLM on Olares One.
    RTX 5090M (24 GB GDDR7, sm_120 Blackwell consumer mobile) + 96 GB DDR5 + Core Ultra 9 275HX.

    Bench validated 2026-05-21 (10 runs Space Invaders HTML 2000 tokens, single user, vLLM nightly):
      - **165.91 t/s AVG post-warmup** (9 runs, range 165.25 – 166.62, σ ≈ 0.5)
      - First run = 23 t/s warmup (graph capture)
      - All subsequent runs converge to 165 t/s within 0.5 t/s

    Stack:
      - Image: vllm/vllm-openai:nightly
      - Model: nvidia/NVIDIA-Nemotron-Labs-3-Elastic-30B-A3B-NVFP4 (~19 GB)
      - NVFP4 GEMM: FlashInferCutlassNvFp4LinearKernel
      - MoE backend: FLASHINFER_CUTLASS
      - Attention backend: FLASH_ATTN v2
      - CUDA graphs: PIECEWISE mode, capture_sizes [1,2,4] (only 40 MB pool)
      - max_model_len: 4096 (limited by 24 GB KV cache headroom)
      - max_num_seqs: 1

    Trade-off vs other paths on Olares One:
      - Use for: pure speed, single-shot Q&A, code completion, agentic Hermes calls (4K context fits most)
      - Don't use for: long-context PDF parsing (use llamacppqwen36beellamaone @ 262K), multi-user concurrency (use vllmgemma426ba4bvisionone), vision (use vllmgemma426ba4bvisionone)

    NVIDIA Open Model License. Tool calling NOT yet wired (no parser config). Thinking mode default ON via model template.

    First launch downloads ~19 GB. OpenAI-compatible API on port 8000.

