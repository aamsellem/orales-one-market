---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-gemma4audio-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/gemma-4-E4B-it-Q4_K_M.gguf"
  MODEL_FILE: "gemma-4-E4B-it-Q4_K_M.gguf"
  MMPROJ_URL: "https://huggingface.co/unsloth/gemma-4-E4B-it-GGUF/resolve/main/mmproj-BF16.gguf"
  MMPROJ_FILE: "gemma-4-E4B-it-mmproj-BF16.gguf"
  MODEL_ALIAS: "gemma-4-e4b-audio"
  CONTEXT_SIZE: "32768"
  N_GPU_LAYERS: "99"
  THREADS: "8"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: llamacppgemma4audione
  name: llamacppgemma4audione
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llamacppgemma4audione
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacppgemma4audione
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              apk add --no-cache wget >/dev/null 2>&1 || true
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Target already downloaded: $MODEL_PATH"; ls -lh "$MODEL_PATH"
              else
                echo "Downloading target from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL" && mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                ls -lh "$MODEL_PATH"
              fi
              MMPROJ_PATH="/models/${MMPROJ_FILE}"
              if [ -f "$MMPROJ_PATH" ]; then
                echo "mmproj already downloaded: $MMPROJ_PATH"; ls -lh "$MMPROJ_PATH"
              else
                echo "Downloading mmproj BF16 from $MMPROJ_URL ..."
                wget -O "$MMPROJ_PATH.tmp" "$MMPROJ_URL" && mv "$MMPROJ_PATH.tmp" "$MMPROJ_PATH"
                ls -lh "$MMPROJ_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-gemma4audio-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server-cuda13-b9101"
          command: ["llama-server"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--mmproj"
            - "/models/$(MMPROJ_FILE)"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "-ngl"
            - "$(N_GPU_LAYERS)"
            - "--threads"
            - "$(THREADS)"
            - "--batch-size"
            - "512"
            - "--ubatch-size"
            - "512"
            - "--parallel"
            - "1"
            - "--mlock"
            - "-fa"
            - "on"
            - "--jinja"
            - "--no-context-shift"
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          envFrom:
            - configMapRef:
                name: llamacpp-gemma4audio-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 60
          resources:
            limits:
              cpu: "16"
              memory: 16Gi
            requests:
              cpu: 2000m
              memory: 4Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: llamacppgemma4audione
  name: llamacppgemma4audione
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: llamacppgemma4audione
