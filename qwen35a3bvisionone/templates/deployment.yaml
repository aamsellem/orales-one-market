---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-vision-env
  namespace: "{{ .Release.Namespace }}"
data:
  MODEL_URL: "https://huggingface.co/unsloth/Qwen3.5-35B-A3B-GGUF/resolve/main/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf"
  MODEL_FILE: "Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf"
  MMPROJ_URL: "https://huggingface.co/steampunque/Qwen3.5-35B-A3B-MP-GGUF/resolve/main/Qwen3.5-35B-A3B.mmproj.gguf"
  MMPROJ_FILE: "Qwen3.5-35B-A3B.mmproj.gguf"
  MODEL_ALIAS: "qwen3.5-35b-a3b-vision"
  CONTEXT_SIZE: "16384"
  N_GPU_LAYERS: "99"
  THREADS: "16"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-template
  namespace: "{{ .Release.Namespace }}"
data:
  chat_template.jinja: |
{{ .Files.Get "chat_template.jinja" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: qwen35a3bvisionone
  name: qwen35a3bvisionone
  namespace: "{{ .Release.Namespace }}"
  annotations:
    applications.app.bytetrade.io/gpu-inject: "false"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: qwen35a3bvisionone
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: qwen35a3bvisionone
    spec:
      initContainers:
        - name: model-downloader
          image: "docker.io/alpine:3.20"
          command:
            - sh
            - '-c'
            - |
              # Download main model
              MODEL_PATH="/models/${MODEL_FILE}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already downloaded: $MODEL_PATH"
                ls -lh "$MODEL_PATH"
              else
                echo "Downloading model from $MODEL_URL ..."
                wget -O "$MODEL_PATH.tmp" "$MODEL_URL"
                mv "$MODEL_PATH.tmp" "$MODEL_PATH"
                echo "Model download complete."
                ls -lh "$MODEL_PATH"
              fi
              # Download mmproj (vision projector)
              MMPROJ_PATH="/models/${MMPROJ_FILE}"
              if [ -f "$MMPROJ_PATH" ]; then
                echo "mmproj already downloaded: $MMPROJ_PATH"
                ls -lh "$MMPROJ_PATH"
              else
                echo "Downloading mmproj from $MMPROJ_URL ..."
                wget -O "$MMPROJ_PATH.tmp" "$MMPROJ_URL"
                mv "$MMPROJ_PATH.tmp" "$MMPROJ_PATH"
                echo "mmproj download complete."
                ls -lh "$MMPROJ_PATH"
              fi
          envFrom:
            - configMapRef:
                name: llamacpp-vision-env
          resources:
            limits:
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: "/models"
              name: models
      containers:
        - name: llamacpp-server
          image: "ghcr.io/ggml-org/llama.cpp:server-cuda13-b8334"
          command: ["/app/llama-server"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--model"
            - "/models/$(MODEL_FILE)"
            - "--mmproj"
            - "/models/$(MMPROJ_FILE)"
            - "--alias"
            - "$(MODEL_ALIAS)"
            - "--ctx-size"
            - "$(CONTEXT_SIZE)"
            - "--n-gpu-layers"
            - "$(N_GPU_LAYERS)"
            - "--threads"
            - "$(THREADS)"
            - "--cache-type-k"
            - "q8_0"
            - "--cache-type-v"
            - "q8_0"
            - "--batch-size"
            - "2048"
            - "--ubatch-size"
            - "1024"
            - "--parallel"
            - "1"
            - "--mlock"
            - "--swa-full"
            - "--flash-attn"
            - "auto"
            - "--op-offload"
            - "--jinja"
            - "--chat-template-file"
            - "/etc/chat-template/chat_template.jinja"
            - "--slot-save-path"
            - "/cache"
            - "--no-context-shift"
          env:
            - name: GGML_CUDA_GRAPH_OPT
              value: "1"
          envFrom:
            - configMapRef:
                name: llamacpp-vision-env
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 120
          resources:
            limits:
              cpu: "16"
              memory: 40Gi
            requests:
              cpu: 4000m
              memory: 24Gi
          volumeMounts:
            - mountPath: "/models"
              name: models
            - mountPath: "/cache"
              name: cache
            - mountPath: "/etc/chat-template"
              name: chat-template
      volumes:
        - name: models
          hostPath:
            path: "{{ .Values.userspace.appData }}/models"
            type: DirectoryOrCreate
        - name: cache
          emptyDir: {}
        - name: chat-template
          configMap:
            name: chat-template
      restartPolicy: Always
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: qwen35a3bvisionone
  name: qwen35a3bvisionone
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "llamacpp"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: qwen35a3bvisionone
status:
  loadBalancer: {}
